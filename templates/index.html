<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | Classic</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            height: 100dvh; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top, #1a1025 0%, #050505 100%);
            color: white;
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            z-index: 1000; transition: 0.3s ease; padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .menu-btn { position: absolute; top: 15px; left: 15px; z-index: 1001; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .new-chat-btn { background: #7c3aed; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 40px; }
        .history-list { flex: 1; overflow-y: auto; margin-top: 20px; }
        .history-item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; font-size: 13px; cursor: pointer; }
        .del-history-btn { background: none; border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 12px; }

        /* --- Main UI --- */
        .chat-box { height: calc(100% - 80px); overflow-y: auto; padding: 20px; padding-top: 70px; display: flex; flex-direction: column; gap: 15px; }
        
        #main-ui { text-align: center; margin-top: 20px; }
        .orb { width: 85px; height: 85px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 100%); border-radius: 50%; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 500px; margin: 20px auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px; font-size: 13px; text-align: left; transition: 0.2s; }

        /* --- Messages --- */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .bot { background: rgba(255, 255, 255, 0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #7c3aed; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* --- Input --- */
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #050505; }
        .input-wrapper { background: rgba(255,255,255,0.1); border-radius: 25px; display: flex; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .send-btn { background: none; border: none; color: #d8b4fe; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="location.reload()">+ New Chat</button>
        <div class="history-list" id="historyList"></div>
        <button class="del-history-btn" onclick="clearHistory()">🗑️ Clear History</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div id="main-ui">
            <div class="orb"></div>
            <h2 style="font-weight: 400; font-size: 26px;">Hey, {{ name }}</h2>
            <p style="color: #9ca3af; margin-bottom: 30px;">How can I help you today?</p>
            <div class="grid-container">
                <div class="card">🖼️ Generate AI Images</div>
                <div class="card">🎥 Create AI Videos</div>
                <div class="card">📂 Analyze Documents</div>
                <div class="card">✍️ Write Better Emails</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Message J.A.R.V.I.S...">
            <button class="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); loadHistory(); }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = `<h4 style="color:#6b7280; font-size:11px; margin-bottom:10px;">RECENT</h4>`;
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item.query;
                div.onclick = () => { input.value = item.query; toggleSidebar(); };
                list.appendChild(div);
            });
        }

        async function clearHistory() {
            if(confirm("Delete all chats?")) {
                await fetch('/delete_history', { method: 'POST' });
                location.reload();
            }
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;
            document.getElementById('main-ui').style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            input.value = '';
            
            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "...";
            chatBox.appendChild(jDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            
            jDiv.innerHTML = marked.parse(data.reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
