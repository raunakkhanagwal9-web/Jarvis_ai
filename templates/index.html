<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Orbix</title>
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #050505; /* Black Theme */
            color: white;
        }

        /* 🔥 MAIN CONTAINER */
        .container {
            height: 100dvh; /* dynamic height fix for mobile keyboard */
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            border-bottom: 1px solid #222;
        }
        header h1 { margin: 0; font-size: 18px; color: #a855f7; letter-spacing: 2px; }

        /* 🔥 CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            /* Space for fixed input bar */
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        /* 🔥 MESSAGES */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .bot {
            background: #262626;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background: #7c3aed;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 🔥 INPUT AREA (FIXED AT BOTTOM) */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #050505;
            border-top: 1px solid #222;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
            font-size: 16px; /* No auto-zoom on iOS */
        }

        .input-area button {
            padding: 12px 20px;
            border: none;
            background: #7c3aed;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        /* ORB DESIGN */
        .orb { width: 60px; height: 60px; background: radial-gradient(circle, #a855f7, #6366f1); border-radius: 50%; filter: blur(1px); box-shadow: 0 0 20px #a855f7; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>J.A.R.V.I.S.</h1>
    </header>

    <div class="chat-box" id="chatBox">
        <center id="welcome">
            <div class="orb"></div>
            <div style="color: #666; font-size: 12px;">SYSTEMS OPERATIONAL</div>
        </center>
        <div class="message bot">Systems online, Sir. How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type message..." autocomplete="off" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        // Hide welcome orb after first message
        document.getElementById('welcome').style.display = 'none';

        // Add User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerText = query;
        chatBox.appendChild(userDiv);

        userInput.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // Jarvis Typing...
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.innerText = "...";
        chatBox.appendChild(botDiv);

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            botDiv.innerText = data.reply;
        } catch (error) {
            botDiv.innerText = "Connection lost, Sir.";
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Enter key support
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Keyboard behavior fix for mobile
    if ('visualViewport' in window) {
        window.visualViewport.addEventListener('resize', () => {
            const inputArea = document.querySelector('.input-area');
            inputArea.style.bottom = `${window.innerHeight - window.visualViewport.height}px`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }
</script>

</body>
</html>
