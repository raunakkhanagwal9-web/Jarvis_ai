<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<title>J.A.R.V.I.S. | Personal AI</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #050505;
  color: white;
  font-family: 'SF Pro Display', -apple-system, sans-serif;
}

/* 🔥 MAIN FIX (dynamic height) */
body {
  display: flex;
  flex-direction: column;
  height: calc(var(--vh, 1vh) * 100);
}

/* CHAT AREA */
#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  padding-bottom: 90px;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  gap: 15px;
  -webkit-overflow-scrolling: touch;
}

/* INPUT AREA */
#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #050505;
  padding: 10px 15px;
  display: flex;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.05);
  z-index: 9999;

  /* 🔥 SAFE AREA FIX */
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

/* --- बाकी UI SAME --- */

#main-ui { text-align: center; padding-top: 20px; display: flex; flex-direction: column; }
.orb { width: 90px; height: 90px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%); border-radius: 50%; margin: 0 auto 20px; filter: blur(5px); box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); animation: pulse 4s infinite alternate; }
@keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; box-shadow: 0 0 60px rgba(168, 85, 247, 0.9); } }

.welcome-text h2 { margin: 0; font-size: 26px; font-weight: 600; }
.welcome-text .tagline { font-size: 16px; font-weight: bold; color: white; margin: 8px 0; }
.welcome-text p { font-size: 13px; color: #9ca3af; margin: 0 auto; max-width: 250px; line-height: 1.4; }

.grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
.card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px; display: flex; flex-direction: column; gap: 6px; backdrop-filter: blur(10px); text-align: left; }

.message { max-width: 85%; padding: 12px 16px; border-radius: 20px; word-wrap: break-word; font-size: 15px; line-height: 1.5; }
.bot { background: rgba(255,255,255,0.1); align-self: flex-start; }
.user { background: #7c3aed; color: white; align-self: flex-end; }

.input-wrapper { width: 100%; background: rgba(255,255,255,0.12); backdrop-filter: blur(25px); border-radius: 30px; display: flex; align-items: center; padding: 5px 10px 5px 15px; border: 1px solid rgba(255,255,255,0.1); }
.input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 16px; }
.icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 8px; font-size: 18px; }

</style>
</head>

<body>

<div id="chatBox">
  <div id="main-ui">
    <div class="orb"></div>
    <div class="welcome-text">
      <h2>Hey 👋, Sir</h2>
      <div class="tagline">Your Personal AI Assistant</div>
      <p>Ready to generate image, schedule meetings, or just chat.</p>
    </div>
  </div>
</div>

<div id="inputArea">
  <div class="input-wrapper">
    <button class="icon-btn">📷</button>
    <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off" />
    <button class="icon-btn" onclick="sendMessage()">SEND</button>
    <button class="icon-btn">🎤</button>
  </div>
</div>

<script>

/* 🔥 HEIGHT FIX */
function setAppHeight() {
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', setAppHeight);
setAppHeight();

/* CHAT LOGIC SAME */
const input = document.getElementById('userInput');
const chatBox = document.getElementById('chatBox');

function scrollToBottom() {
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const query = input.value.trim();
  if (!query) return;

  const uDiv = document.createElement('div');
  uDiv.className = 'message user';
  uDiv.innerText = query;
  chatBox.appendChild(uDiv);

  input.value = '';
  scrollToBottom();

  const jDiv = document.createElement('div');
  jDiv.className = 'message bot';
  jDiv.innerText = "...";
  chatBox.appendChild(jDiv);
  scrollToBottom();

  try {
    const response = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query })
    });
    const data = await response.json();
    jDiv.innerText = data.reply;
    scrollToBottom();
  } catch (e) {
    jDiv.innerText = "Connection error";
  }
}

input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});

input.addEventListener('focus', () => {
  setTimeout(scrollToBottom, 300);
});

</script>

</body>
</html>
