<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>J.A.R.V.I.S. | Personal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #050505; color: white;
        }

        /* --- SIDEBAR UPDATE --- */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .sidebar.active { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .sidebar-overlay.active { display: block; }

        .menu-btn { position: absolute; top: 15px; left: 15px; z-index: 100; background: none; border: none; color: white; font-size: 24px; cursor: pointer; opacity: 0.7; }

        .new-chat-btn { background: #7c3aed; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 40px; }
        
        /* DELETE BUTTON RED STYLE */
        .del-btn { background: rgba(255, 77, 77, 0.15); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 13px; font-weight: 600; }

        .history-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 13px; color: #d1d5db; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }

        .container { display: flex; flex-direction: column; height: 100%; width: 100%; background: var(--bg-gradient); position: relative; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }

        /* --- Welcome UI --- */
        #main-ui { text-align: center; padding-top: 60px; }
        .orb { width: 90px; height: 90px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 100%); border-radius: 50%; margin: 0 auto 20px; filter: blur(2px); box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); animation: orbPulse 4s infinite alternate; }
        @keyframes orbPulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; padding: 15px; text-align: left; font-size: 14px; }

        /* --- Message Styles (ChatGPT Look) --- */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15.5px; line-height: 1.7; word-wrap: break-word; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .bot { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* --- Input Area --- */
        .input-area { padding: 10px 15px; background: #050505; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .input-wrapper { background: rgba(255,255,255,0.12); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 16px; }
        .send-text { color: #d8b4fe; font-weight: 600; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="location.reload()">+ New Chat</button>
        <button class="del-btn" onclick="clearHistory()">🗑️ Clear All History</button>
        
        <div id="historyList" style="overflow-y: auto; flex: 1; margin-top: 10px;">
            <h4 style="color: #9ca3af; font-size: 11px; text-transform: uppercase;">Recent</h4>
        </div>
    </div>

    <div class="container">
        <div class="chat-box" id="chatBox">
            <div id="main-ui">
                <div class="orb"></div>
                <h2>Hey 👋, {{ name }}</h2>
                <div class="grid-container">
                    <div class="card">🖼️ Generate Image</div>
                    <div class="card">🎥 Create Video</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
                <button class="send-text" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if(sidebar.classList.contains('active')) loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = `<h4 style="color: #9ca3af; font-size: 11px; text-transform: uppercase;">Recent</h4>`;
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item.query;
                div.onclick = () => { input.value = item.query; toggleSidebar(); };
                list.appendChild(div);
            });
        }

        // 🔥 DELETE HISTORY FUNCTION 🔥
        async function clearHistory() {
            if(confirm("Sir, are you sure? Pura history saaf ho jayega.")) {
                const res = await fetch('/delete_history', { method: 'POST' });
                const data = await res.json();
                if(data.status === "success") {
                    location.reload();
                }
            }
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;
            document.getElementById('main-ui').style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "...";
            chatBox.appendChild(jDiv);

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            
            let fullText = data.reply;
            let index = 0;
            jDiv.innerHTML = "";
            const typer = setInterval(() => {
                if (index <= fullText.length) {
                    jDiv.innerHTML = marked.parse(fullText.substring(0, index));
                    chatBox.scrollTop = chatBox.scrollHeight;
                    index += 6;
                } else {
                    clearInterval(typer);
                    jDiv.innerHTML = marked.parse(fullText);
                }
            }, 12);
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
