<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S.</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            height: 100dvh; background: radial-gradient(circle at top, #1a1025 0%, #050505 100%);
            color: white; font-family: -apple-system, sans-serif; overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .menu-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 1001; }

        /* --- Chat Box --- */
        .chat-box { height: 100%; overflow-y: auto; padding: 20px; padding-top: 60px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 15px; }

        /* --- Original Welcome UI --- */
        #main-ui { text-align: center; margin-top: 40px; }
        .orb { width: 90px; height: 90px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 100%); border-radius: 50%; margin: 0 auto 20px; filter: blur(2px); box-shadow: 0 0 40px rgba(168, 85, 247, 0.4); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 400px; margin: 20px auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; font-size: 13px; text-align: left; }

        /* --- Messages --- */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; font-size: 15.5px; animation: fadeIn 0.2s ease; }
        .user { align-self: flex-end; background: #7c3aed; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }

        /* --- Original Floating Search Bar --- */
        .input-area { position: fixed; bottom: 30px; width: 100%; padding: 0 20px; z-index: 10; }
        .input-wrapper { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 30px; display: flex; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.15); max-width: 600px; margin: 0 auto; }
        input { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .send-btn { background: none; border: none; color: #d8b4fe; font-weight: 600; cursor: pointer; padding-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    
    <div class="sidebar" id="sidebar">
        <button style="background:#7c3aed; border:none; color:white; padding:12px; border-radius:10px; margin-top:40px; cursor:pointer;" onclick="location.reload()">+ New Chat</button>
        <div id="historyList" style="margin-top:20px; flex:1; overflow-y:auto;">
            <h4 style="color: #6b7280; font-size: 11px; text-transform: uppercase;">Recent</h4>
        </div>
        <button style="background:none; border:1px solid rgba(255,0,0,0.3); color:#ff4d4d; padding:10px; border-radius:10px; cursor:pointer; font-size:12px;" onclick="clearHistory()">🗑️ Clear History</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div id="main-ui">
            <div class="orb"></div>
            <h2 style="font-weight: 400; margin-bottom: 5px;">Hey, {{ name }}</h2>
            <p style="color: #9ca3af; font-size: 14px; margin-bottom: 25px;">How can I help you today?</p>
            <div class="grid-container">
                <div class="card">🖼️ Generate AI Images</div>
                <div class="card">🎥 Create AI Videos</div>
                <div class="card">📂 Analyze Documents</div>
                <div class="card">✍️ Write Better Emails</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = `<h4 style="color: #6b7280; font-size: 11px; text-transform: uppercase;">Recent</h4>`;
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.style = "padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:8px; font-size:13px; cursor:pointer;";
                div.innerText = item.query;
                div.onclick = () => { input.value = item.query; toggleSidebar(); };
                list.appendChild(div);
            });
        }

        async function clearHistory() {
            if(confirm("Sir, delete all history?")) {
                await fetch('/delete_history', { method: 'POST' });
                location.reload();
            }
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;
            document.getElementById('main-ui').style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "...";
            chatBox.appendChild(jDiv);

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            
            // FAST REPLY
            jDiv.innerHTML = marked.parse(data.reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
