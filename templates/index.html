<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Personal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* 🔥 RESET (Aapka Code) */
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #050505;
            color: white;
        }

        /* 🔥 MAIN CONTAINER (Aapka Code) */
        .container {
            height: 100dvh; /* dynamic height fix */
            display: flex;
            flex-direction: column;
            background: var(--bg-gradient);
        }

        /* 🔥 CHAT AREA (Aapka Code) */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            /* 👇 input bar ke liye space */
            padding-bottom: 90px;
            /* smooth scroll */
            scroll-behavior: smooth;
            
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- J.A.R.V.I.S. Welcome UI Styles --- */
        #main-ui {
            text-align: center;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .orb {
            width: 90px; height: 90px;
            background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            filter: blur(5px);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; box-shadow: 0 0 60px rgba(168, 85, 247, 0.9); }
        }

        .welcome-text h2 { margin: 0; font-size: 26px; font-weight: 600; }
        .welcome-text .tagline { font-size: 16px; font-weight: bold; color: white; margin: 8px 0; }
        .welcome-text p { font-size: 13px; color: #9ca3af; margin: 0 auto; max-width: 250px; line-height: 1.4; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(10px);
            text-align: left;
        }
        .card-icon { font-size: 20px; }
        .card-title { font-weight: 600; font-size: 14px; }
        .card-desc { font-size: 11px; color: #9ca3af; line-height: 1.3; }

        /* 🔥 MESSAGES (Aapka Code + Jarvis Design) */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }
        
        /* Markdown Styles */
        .message p { margin: 0 0 10px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 5px 0; padding-left: 20px; }
        .message strong { color: #d8b4fe; }
        .message pre { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
        .message code { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; font-family: monospace; }

        /* bot message */
        .bot {
            background: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* user message */
        .user {
            background: #7c3aed;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 🔥 INPUT AREA (SEARCH BAR FIXED - Aapka Code + Dark Theme) */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: #050505;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            /* 🔥 SAFE AREA (important for mobile) */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 1000;
        }

        .input-wrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 10px 5px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* INPUT FIELD */
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 5px;
            outline: none;
            font-size: 16px;
        }

        .icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 8px; font-size: 18px; }
        .send-text { color: #d8b4fe; font-weight: 600; font-size: 14px; margin-right: 5px; }
        .mic-btn { background: #7c3aed; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <div class="container">

        <div class="chat-box" id="chatBox">
            
            <div id="main-ui">
                <div class="orb"></div>
                <div class="welcome-text">
                    <h2>Hey 👋, Sir</h2>
                    <div class="tagline">Your Personal AI Assistant</div>
                    <p>Ready to generate image, schedule meetings, or just chat.</p>
                </div>
                <div class="grid-container">
                    <div class="card"><span class="card-icon">🖼️</span><span class="card-title">Generate Image</span><span class="card-desc">Instantly bring ideas to life</span></div>
                    <div class="card"><span class="card-icon">🎥</span><span class="card-title">Create Video</span><span class="card-desc">Effortless reels with AI</span></div>
                    <div class="card"><span class="card-icon">📝</span><span class="card-title">Summarise Text</span><span class="card-desc">Essential info in few words</span></div>
                    <div class="card"><span class="card-icon">📄</span><span class="card-title">CV Builder</span><span class="card-desc">Create your own CV</span></div>
                </div>
            </div>

            </div>

        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <button class="icon-btn">📷</button>
                <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off" />
                <button class="icon-btn send-text" onclick="sendMessage()">SEND</button>
                <button class="icon-btn mic-btn">🎤</button>
            </div>
        </div>

    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const mainUi = document.getElementById('main-ui');

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;

            // Hide main UI on first message
            if (mainUi.style.display !== 'none') {
                mainUi.style.display = 'none';
            }

            // User Message
            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            
            input.value = '';
            scrollToBottom();

            // Jarvis Placeholder
            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "...";
            chatBox.appendChild(jDiv);
            scrollToBottom();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                
                // Streaming Effect + Markdown
                const fullText = data.reply;
                let index = 0;
                jDiv.innerHTML = ""; 
                
                const typer = setInterval(() => {
                    if (index <= fullText.length) {
                        jDiv.innerHTML = marked.parse(fullText.substring(0, index));
                        scrollToBottom();
                        index += 3; 
                    } else {
                        clearInterval(typer);
                        jDiv.innerHTML = marked.parse(fullText); 
                        scrollToBottom();
                    }
                }, 15);

            } catch (e) { 
                jDiv.innerText = "Sir, connection lost."; 
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        
        // Input focus hone par turant scroll kare
        input.addEventListener('focus', () => {
            setTimeout(scrollToBottom, 300);
        });
        
        // Visual Viewport Script jo pichli baar dikkat kar rahi thi usko nikaal diya hai, 
        // kyunki aapka diya hua CSS isko bina script ke fix kar deta hai.
        if ('visualViewport' in window) {
            window.visualViewport.addEventListener('resize', () => {
                const inputArea = document.getElementById('inputArea');
                inputArea.style.bottom = `${window.innerHeight - window.visualViewport.height}px`;
                scrollToBottom();
            });
        }
    </script>
</body>
</html>
