<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix Studio | J.A.R.V.I.S.</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-purple: #a855f7;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100dvh;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Orb Animation */
        .orb-container {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .orb {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            filter: blur(5px);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; box-shadow: 0 0 60px rgba(168, 85, 247, 0.9); }
        }

        .welcome-text h2 { margin: 0; font-size: 24px; font-weight: 600; }
        .welcome-text p { font-size: 13px; color: #9ca3af; margin: 10px auto; max-width: 250px; line-height: 1.4; }

        /* Feature Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            flex-grow: 1;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }

        .card-icon { font-size: 20px; }
        .card-title { font-weight: 600; font-size: 14px; }
        .card-desc { font-size: 11px; color: #9ca3af; }

        /* Chat History (Hidden initially) */
        #chat-history {
            display: none; /* Only shows when chatting starts */
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            flex-direction: column;
            gap: 15px;
        }

        /* Modern Input Bar */
        .bottom-nav {
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .input-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 15px;
        }

        .icon-btn {
            background: none; border: none; color: white;
            font-size: 18px; cursor: pointer; padding: 8px;
        }

        .mic-btn {
            background: #7c3aed;
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Message Styles */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #7c3aed; }
        .jarvis-msg { align-self: flex-start; background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div id="main-ui">
        <div class="orb-container">
            <div class="orb"></div>
            <div class="welcome-text">
                <h2>Hi, Orbix Studio</h2>
                <p>Give any command naturally, from generating image to scheduling meetings</p>
            </div>
        </div>

        <div class="grid-container">
            <div class="card">
                <span class="card-icon">🖼️</span>
                <span class="card-title">Generate Image</span>
                <span class="card-desc">Instantly bring ideas to life</span>
            </div>
            <div class="card">
                <span class="card-icon">🎥</span>
                <span class="card-title">Create Video</span>
                <span class="card-desc">Effortlessly reels with AI</span>
            </div>
            <div class="card">
                <span class="card-icon">📝</span>
                <span class="card-title">Summarise Text</span>
                <span class="card-desc">Essential info in few words</span>
            </div>
            <div class="card">
                <span class="card-icon">📄</span>
                <span class="card-title">CV Builder</span>
                <span class="card-desc">Create your own CV</span>
            </div>
        </div>
    </div>

    <div id="chat-history"></div>

    <div class="bottom-nav">
        <div class="input-bar">
            <button class="icon-btn">📷</button>
            <input type="text" id="userInput" placeholder="Type Message" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="icon-btn" onclick="sendMessage()">🚀</button>
            <button class="icon-btn mic-btn">🎤</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (!query) return;

            // Switch UI from Grid to Chat
            document.getElementById('main-ui').style.display = 'none';
            const chatHistory = document.getElementById('chat-history');
            chatHistory.style.display = 'flex';

            // Add User Message
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user-msg';
            uDiv.innerText = query;
            chatHistory.appendChild(uDiv);
            
            input.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // Placeholder for Jarvis
            const jDiv = document.createElement('div');
            jDiv.className = 'msg jarvis-msg';
            jDiv.innerText = "...";
            chatHistory.appendChild(jDiv);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                jDiv.innerText = data.reply;
            } catch (e) { jDiv.innerText = "Error, Sir."; }

            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
