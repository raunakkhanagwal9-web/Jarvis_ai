<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>J.A.R.V.I.S. | Orbix Style</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.06);
            --accent: #7c3aed;
        }
        body {
            margin: 0; padding: 0; height: 100dvh; background: var(--bg);
            color: white; font-family: 'SF Pro Display', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Background Glow */
        .glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #2e1065 0%, #0a0a0c 80%);
            z-index: -1;
        }

        /* Sidebar & Menu */
        .menu-btn { position: absolute; top: 20px; left: 20px; z-index: 100; background: none; border: none; color: white; font-size: 22px; cursor: pointer; opacity: 0.8; }
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: rgba(15, 15, 18, 0.98); backdrop-filter: blur(25px);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.active { left: 0; }

        /* Main Container */
        .container { display: flex; flex-direction: column; height: 100%; position: relative; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; scroll-behavior: smooth; }

        /* Welcome UI (As per Screenshot) */
        #main-ui { text-align: center; margin: auto 0; padding-bottom: 40px; animation: fadeIn 0.8s ease; }
        .orb {
            width: 100px; height: 100px; margin: 0 auto 30px;
            background: radial-gradient(circle, #d8b4fe 0%, #a855f7 40%, #6366f1 100%);
            border-radius: 50%; filter: blur(1px);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.4);
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        h2 { font-size: 28px; font-weight: 600; margin: 0 0 10px; letter-spacing: -0.5px; }
        .sub-text { color: #94a3b8; font-size: 14px; margin-bottom: 35px; line-height: 1.5; padding: 0 40px; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; max-width: 500px; margin: 0 auto; }
        .card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 20px; text-align: left; transition: 0.3s;
        }
        .card i { font-size: 18px; margin-bottom: 12px; display: block; }
        .card-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: block; }
        .card-desc { color: #64748b; font-size: 11px; }

        /* Messages */
        .message { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 15.5px; line-height: 1.6; margin-bottom: 12px; animation: msgSlide 0.3s ease; }
        .user { align-self: flex-end; background: #7c3aed; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
        @keyframes msgSlide { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        /* Floating Input Bar */
        .input-area {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; z-index: 100;
        }
        .input-wrapper {
            background: rgba(30, 30, 35, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 6px 8px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        input { flex: 1; background: none; border: none; color: white; padding: 10px 5px; outline: none; font-size: 16px; }
        .send-btn { background: #7c3aed; color: white; border-radius: 50%; width: 38px; height: 38px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="glow"></div>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    
    <div class="sidebar" id="sidebar">
        <button style="background:var(--accent); border:none; color:white; width:100%; padding:14px; border-radius:15px; font-weight:600; margin-top:40px;" onclick="location.reload()">+ New Chat</button>
        <div id="historyList" style="margin-top:25px;"></div>
        <button onclick="clearHistory()" style="position:absolute; bottom:30px; left:25px; background:none; border:1px solid #ef4444; color:#ef4444; padding:10px; border-radius:12px; width:calc(100% - 50px); cursor:pointer; font-size:13px;">🗑️ Clear All History</button>
    </div>

    <div class="container">
        <div class="chat-box" id="chatBox">
            <div id="main-ui">
                <div class="orb"></div>
                <h2>Hi, {{ name }}</h2>
                <p class="sub-text">Give any command naturally, from generating image to scheduling meetings</p>
                
                <div class="grid">
                    <div class="card">
                        <span>🖼️</span>
                        <span class="card-title">Generate Image</span>
                        <span class="card-desc">Instantly bring ideas to life</span>
                    </div>
                    <div class="card">
                        <span>🎥</span>
                        <span class="card-title">Create Video</span>
                        <span class="card-desc">Effortlessly reels with AI</span>
                    </div>
                    <div class="card">
                        <span>📝</span>
                        <span class="card-title">Summarise Text</span>
                        <span class="card-desc">Essential info in few words</span>
                    </div>
                    <div class="card">
                        <span>📑</span>
                        <span class="card-title">CV Builder</span>
                        <span class="card-desc">Create your own CV</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="icon-btn">📷</button>
                <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">⬆️</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); loadHistory(); }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = `<h4 style="color:#64748b; font-size:11px; letter-spacing:1px; margin-bottom:15px;">RECENT</h4>`;
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.style = "padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; margin-bottom:8px; font-size:13px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;";
                div.innerText = item.query;
                div.onclick = () => { userInput.value = item.query; toggleSidebar(); };
                list.appendChild(div);
            });
        }

        async function clearHistory() {
            if(confirm("Confirm delete all history?")) { await fetch('/delete_history', {method:'POST'}); location.reload(); }
        }

        async function sendMessage() {
            const query = userInput.value.trim();
            if(!query) return;
            document.getElementById('main-ui').style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            userInput.value = '';

            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "Thinking...";
            chatBox.appendChild(jDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            
            // Fast Reply Update
            jDiv.innerHTML = marked.parse(data.reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
