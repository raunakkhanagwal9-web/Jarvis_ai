<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Personal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-purple: #a855f7;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100dvh;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Home UI Section */
        #main-ui {
            text-align: center;
            padding: 50px 20px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .orb {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            filter: blur(5px);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
            animation: pulse 4s infinite alternate;
            flex-shrink: 0;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; box-shadow: 0 0 60px rgba(168, 85, 247, 0.9); }
        }

        .welcome-text h2 { margin: 0; font-size: 26px; font-weight: 600; }
        .welcome-text .tagline { font-size: 16px; font-weight: bold; color: white; margin: 10px 0; }
        .welcome-text p { font-size: 13px; color: #9ca3af; margin: 0 auto; max-width: 250px; line-height: 1.4; }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 30px 10px;
            margin-top: auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(10px);
            text-align: left;
        }

        .card-icon { font-size: 20px; }
        .card-title { font-weight: 600; font-size: 14px; }
        .card-desc { font-size: 11px; color: #9ca3af; line-height: 1.3; }

        /* Chat History */
        #chat-history {
            display: none;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        /* Bubbles */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #7c3aed; border-bottom-right-radius: 4px; }
        .jarvis-msg { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        /* Floating Input Bar */
        .bottom-nav {
            padding: 10px 15px;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 1000;
            background: linear-gradient(transparent, #050505 40%);
        }

        .input-bar {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 10px 5px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 5px;
            outline: none;
            font-size: 16px;
        }

        .icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 8px; font-size: 18px; }
        .send-text { color: #d8b4fe; font-weight: 600; font-size: 14px; margin-right: 5px; }
        .mic-btn { background: #7c3aed; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <div id="main-ui">
        <div class="orb"></div>
        <div class="welcome-text">
            <h2>Hi, Boss</h2>
            <div class="tagline">Your Personal AI Assistant</div>
            <p>Ready to generate image, schedule meetings, or just chat.</p>
        </div>

        <div class="grid-container">
            <div class="card"><span class="card-icon">🖼️</span><span class="card-title">Generate Image</span><span class="card-desc">Instantly bring ideas to life</span></div>
            <div class="card"><span class="card-icon">🎥</span><span class="card-title">Create Video</span><span class="card-desc">Effortless reels with AI</span></div>
            <div class="card"><span class="card-icon">📝</span><span class="card-title">Summarise Text</span><span class="card-desc">Essential info in few words</span></div>
            <div class="card"><span class="card-icon">📄</span><span class="card-title">CV Builder</span><span class="card-desc">Create your own CV</span></div>
        </div>
    </div>

    <div id="chat-history"></div>

    <div class="bottom-nav">
        <div class="input-bar">
            <button class="icon-btn">📷</button>
            <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
            <button class="icon-btn send-text" onclick="sendMessage()">SEND</button>
            <button class="icon-btn mic-btn">🎤</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatHistory = document.getElementById('chat-history');
        const mainUi = document.getElementById('main-ui');

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;

            if (mainUi.style.display !== 'none') {
                mainUi.style.display = 'none';
                chatHistory.style.display = 'flex';
            }

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user-msg';
            uDiv.innerText = query;
            chatHistory.appendChild(uDiv);
            
            input.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            const jDiv = document.createElement('div');
            jDiv.className = 'msg jarvis-msg';
            jDiv.innerText = "...";
            chatHistory.appendChild(jDiv);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                jDiv.innerText = data.reply;
            } catch (e) { jDiv.innerText = "Sir, connection lost."; }

            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        if ('visualViewport' in window) {
            window.visualViewport.addEventListener('resize', () => {
                const nav = document.querySelector('.bottom-nav');
                nav.style.bottom = `${window.innerHeight - window.visualViewport.height}px`;
                if (chatHistory.style.display === 'flex') chatHistory.scrollTop = chatHistory.scrollHeight;
            });
        }
    </script>
</body>
</html>
