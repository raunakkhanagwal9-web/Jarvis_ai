<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S.</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: #000;
            font-family: -apple-system, sans-serif;
            overflow: hidden; /* Screen ko hilne se rokega */
        }

        /* Header hamesha Top par Fixed */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Chat History - Iska scroll independent rahega */
        #chat-history {
            height: 100vh;
            overflow-y: auto;
            padding: 70px 15px 100px 15px; /* Top aur Bottom fixed bars ke liye space */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #000;
        }

        /* Search Bar hamesha Bottom par Fixed */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px;
            background: #000;
            z-index: 1000;
            /* Ye line keyboard ke saath move hone mein help karegi */
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .input-bar {
            background: #1c1c1e;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 16px; /* 16px se browser zoom nahi hota */
        }

        .msg { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 15px; color: white; }
        .user-msg { align-self: flex-end; background: #7c3aed; }
        .jarvis-msg { align-self: flex-start; background: #262626; }
        
        .orb { width: 50px; height: 50px; background: radial-gradient(circle, #a855f7, #6366f1); border-radius: 50%; filter: blur(1px); box-shadow: 0 0 20px #a855f7; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div style="text-align: center;">
            <div style="font-weight: bold; font-size: 14px; color: white;">J.A.R.V.I.S.</div>
            <div style="font-size: 9px; color: #a855f7;">ORBIX STUDIO</div>
        </div>
    </header>

    <div id="chat-history">
        <div id="welcome" style="text-align:center; margin-top: 50px; color: white;">
            <center><div class="orb"></div></center>
            <h3 style="margin: 0;">Systems Online</h3>
            <p style="font-size: 12px; color: #555;">Waiting for your command, Boss.</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-bar">
            <span style="font-size: 18px; margin-right: 8px;">📷</span>
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()" style="background:none; border:none; color:#a855f7; font-weight:bold;">SEND</button>
        </div>
    </div>

<script>
    const chatHistory = document.getElementById('chat-history');
    const input = document.getElementById('userInput');

    async function sendMessage() {
        const query = input.value.trim();
        if (!query) return;

        document.getElementById('welcome').style.display = 'none';

        const uDiv = document.createElement('div');
        uDiv.className = 'msg user-msg';
        uDiv.innerText = query;
        chatHistory.appendChild(uDiv);
        
        input.value = '';
        chatHistory.scrollTop = chatHistory.scrollHeight;

        const jDiv = document.createElement('div');
        jDiv.className = 'msg jarvis-msg';
        jDiv.innerText = "...";
        chatHistory.appendChild(jDiv);

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            jDiv.innerText = data.reply;
        } catch (e) { jDiv.innerText = "Connection lost, Sir."; }

        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    // Isse keyboard khulne par page nahi hilega, sirf input upar aayega
    if ('visualViewport' in window) {
        window.visualViewport.addEventListener('resize', () => {
            const nav = document.querySelector('.bottom-nav');
            // Keyboard ki height ke hisaab se position adjust hogi
            nav.style.bottom = `${window.innerHeight - window.visualViewport.height}px`;
        });
    }
</script>

</body>
</html>
