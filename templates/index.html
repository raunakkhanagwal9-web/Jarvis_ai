<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | Personal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --sidebar-bg: rgba(10, 10, 10, 0.95);
        }

        html, body {
            margin: 0; padding: 0;
            height: 100dvh; overflow: hidden;
            font-family: 'SF Pro Display', sans-serif;
            background: #050505; color: white;
        }

        .container { display: flex; height: 100%; width: 100%; background: var(--bg-gradient); position: relative; }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            position: absolute; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar-bg); backdrop-filter: blur(20px);
            z-index: 100; transition: 0.3s ease; border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .new-chat-btn {
            background: rgba(124, 58, 237, 0.2); border: 1px solid #7c3aed;
            color: white; padding: 10px; border-radius: 12px; width: 100%;
            cursor: pointer; font-weight: 600; margin-bottom: 20px;
        }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px;
            font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- MAIN CHAT AREA --- */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        .header-nav {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: white; }

        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        /* Welcome UI */
        #main-ui { text-align: center; padding: 40px 20px; }
        .orb { width: 80px; height: 80px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 100%); border-radius: 50%; margin: 0 auto 20px; filter: blur(2px); box-shadow: 0 0 30px rgba(168, 85, 247, 0.5); animation: pulse 3s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Messages */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .bot { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #7c3aed; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Input Area */
        .input-area { padding: 15px; background: rgba(5,5,5,0.8); }
        .input-wrapper { background: rgba(255,255,255,0.1); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 16px; }
        .send-btn { color: #d8b4fe; background: none; border: none; font-weight: 600; cursor: pointer; }

        /* Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Recent Chats</h3>
                <button class="menu-btn" onclick="toggleSidebar()">✕</button>
            </div>
            <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            <div class="history-list" id="historyList">
                </div>
        </div>

        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div class="main-content">
            <div class="header-nav">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span style="font-weight: 600; letter-spacing: 1px;">J.A.R.V.I.S.</span>
            </div>

            <div class="chat-box" id="chatBox">
                <div id="main-ui">
                    <div class="orb"></div>
                    <h2>Welcome, {{ name }}</h2>
                    <p style="color: #9ca3af; font-size: 14px;">How can I assist you today, Sir?</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Message Jarvis..." autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const mainUi = document.getElementById('main-ui');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if(sidebar.classList.contains('active')) loadHistory();
        }

        function newChat() {
            chatBox.innerHTML = `<div id="main-ui"><div class="orb"></div><h2>Welcome, {{ name }}</h2><p>New session started, Sir.</p></div>`;
            toggleSidebar();
        }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item.query;
                list.appendChild(div);
            });
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;

            if (mainUi) mainUi.style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerHTML = "Thinking...";
            chatBox.appendChild(jDiv);

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            jDiv.innerHTML = marked.parse(data.reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
