<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(17, 25, 40, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            color: #00d2ff;
            letter-spacing: 2px;
        }
        header small {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px; /* Space for fixed input */
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .jarvis-message {
            align-self: flex-start;
            background: #1e2736;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Fixed Bottom Input Bar */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, #0b0f19 30%);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            background: #1e2736;
            border-radius: 25px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            background: #00d2ff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-left: 10px;
        }
        button:hover { transform: scale(1.1); background: #00b8e6; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>J.A.R.V.I.S.</h1>
    <small>Your Personal AI Assistant</small>
</header>

<div id="chat-container">
    <div class="message jarvis-message">Systems online, Sir. How can I help you today?</div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Message J.A.R.V.I.S..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const query = input.value.trim();

        if (!query) return;

        // User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.innerText = query;
        chatContainer.appendChild(userDiv);

        input.value = '';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // Jarvis Typing
        const jarvisDiv = document.createElement('div');
        jarvisDiv.className = 'message jarvis-message';
        jarvisDiv.innerText = "...";
        chatContainer.appendChild(jarvisDiv);

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            jarvisDiv.innerText = data.reply;
        } catch (error) {
            jarvisDiv.innerText = "Sir, connection issue aa raha hai.";
        }
        
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
