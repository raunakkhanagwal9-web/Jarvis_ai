<            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d2ff;
            --bg-color: #0a0e17;
            --chat-bg: #161b22;
            --text-color: #e6edf3;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            letter-spacing: 3px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        header small {
            font-size: 0.4em;
            display: block;
            color: #fff;
            opacity: 0.8;
            margin-top: 5px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 16px;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .jarvis-message {
            align-self: flex-start;
            background-color: var(--chat-bg);
            border: 1px solid #30363d;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            background: #0d1117;
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background: var(--primary-color);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 10px var(--primary-color);
            transform: scale(1.05);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0e17; }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>J.A.R.V.I.S. <small>Your Personal AI Assistant</small></h1>
</header>

<div id="chat-container">
    <div class="message jarvis-message">Systems online, Sir. How can I assist you today?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask me anything, Boss..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const query = input.value.trim();

        if (!query) return;

        // User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.innerText = query;
        chatContainer.appendChild(userDiv);

        input.value = '';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // Jarvis Typing Placeholder
        const jarvisDiv = document.createElement('div');
        jarvisDiv.className = 'message jarvis-message';
        jarvisDiv.innerText = "...";
        chatContainer.appendChild(jarvisDiv);

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            jarvisDiv.innerText = data.reply;
        } catch (error) {
            jarvisDiv.innerText = "Connection lost, Sir. Please check the servers.";
        }
        
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
