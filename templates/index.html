<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Your Personal AI Assistant</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: #050505;
            color: white;
            font-family: -apple-system, sans-serif;
            overflow: hidden; /* Body ko scroll hone se rokega */
        }

        /* Main Wrapper jo poori screen cover karega */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Mobile keyboard ke liye best */
        }

        /* Header hamesha Top par fixed rahega */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        /* Chat History jo bachi hui jagah lega aur scroll hoga */
        #chat-history {
            flex: 1; /* Ye saari khali jagah le lega */
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* Naya search bar jo hamesha bottom par rahega */
        .bottom-nav {
            padding: 10px 15px 25px 15px; /* Niche thodi extra jagah */
            background: #050505;
        }

        .input-bar {
            background: #1a1a1a;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 16px; /* 16px se zoom nahi hota iPhone par */
        }

        /* Message Bubbles */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; }
        .user-msg { align-self: flex-end; background: #7c3aed; border-bottom-right-radius: 4px; }
        .jarvis-msg { align-self: flex-start; background: #262626; border-bottom-left-radius: 4px; }

        #main-ui { text-align: center; padding: 40px 20px; }
        .orb { width: 80px; height: 80px; background: radial-gradient(circle, #a855f7, #6366f1); border-radius: 50%; margin: 0 auto 20px; filter: blur(2px); box-shadow: 0 0 30px #a855f7; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div style="font-weight: bold; color: #a855f7;">J.A.R.V.I.S.</div>
        <div style="font-size: 10px; color: #888;">Orbix Studio</div>
    </header>

    <div id="chat-history">
        <div id="main-ui">
            <div class="orb"></div>
            <h3>Hi, Orbix Studio</h3>
            <p style="font-size: 12px; color: #666;">How can I assist you today?</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-bar">
            <span style="margin-right: 10px;">📷</span>
            <input type="text" id="userInput" placeholder="Type Message" autocomplete="off">
            <button onclick="sendMessage()" style="background:none; border:none; cursor:pointer;">🚀</button>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chat-history');
    const input = document.getElementById('userInput');

    async function sendMessage() {
        const query = input.value.trim();
        if (!query) return;

        document.getElementById('main-ui').style.display = 'none';

        const uDiv = document.createElement('div');
        uDiv.className = 'msg user-msg';
        uDiv.innerText = query;
        chatHistory.appendChild(uDiv);
        
        input.value = '';
        chatHistory.scrollTop = chatHistory.scrollHeight;

        const jDiv = document.createElement('div');
        jDiv.className = 'msg jarvis-msg';
        jDiv.innerText = "...";
        chatHistory.appendChild(jDiv);

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            jDiv.innerText = data.reply;
        } catch (e) { jDiv.innerText = "Error, Sir."; }

        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // Input par focus hote hi chat ko niche dhakalna
    input.addEventListener('focus', () => {
        setTimeout(() => {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }, 300);
    });

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
