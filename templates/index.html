<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>J.A.R.V.I.S. | Personal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* 🔥 AAPKA ORIGINAL CSS 🔥 */
        * { box-sizing: border-box; }
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; overflow: hidden;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #050505; color: white;
        }
        .container { display: flex; flex-direction: column; height: 100%; width: 100%; background: var(--bg-gradient); position: relative; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* 🔥 SIDEBAR (NEW STUFF - AAPKE DESIGN MEIN FIT) 🔥 */
        .sidebar {
            position: absolute; left: -260px; top: 0; width: 260px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.3s ease; border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .history-item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; font-size: 13px; cursor: pointer; }
        .menu-toggle { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 20px; cursor: pointer; background: none; border: none; color: white; }

        /* --- Welcome UI Styles --- */
        #main-ui { text-align: center; padding-top: 50px; display: flex; flex-direction: column; }
        .orb { width: 90px; height: 90px; background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%); border-radius: 50%; margin: 0 auto 20px; filter: blur(5px); box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); animation: pulse 4s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
        .welcome-text h2 { margin: 0; font-size: 26px; font-weight: 600; }
        .welcome-text .tagline { font-size: 16px; font-weight: bold; color: white; margin: 8px 0; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 18px; text-align: left; }

        /* --- Message Styles --- */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .bot { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: #7c3aed; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* 🔥 INPUT AREA 🔥 */
        .input-area { flex-shrink: 0; background: #050505; padding: 10px 15px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .input-wrapper { background: rgba(255, 255, 255, 0.12); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 16px; }
        .send-text { color: #d8b4fe; font-weight: 600; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="sidebar" id="sidebar">
            <h3 style="margin-top: 40px;">Recent Chats</h3>
            <button onclick="window.location.reload()" style="background: #7c3aed; color:white; border:none; padding:10px; border-radius:8px; margin-bottom:20px; cursor:pointer;">+ New Chat</button>
            <div id="historyList"></div>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div class="chat-box" id="chatBox">
            <div id="main-ui">
                <div class="orb"></div>
                <div class="welcome-text">
                    <h2>Hey 👋, {{ name }}</h2>
                    <div class="tagline">Your Personal AI Assistant</div>
                </div>
                <div class="grid-container">
                    <div class="card">🖼️ Generate Image</div>
                    <div class="card">🎥 Create Video</div>
                    <div class="card">📝 Summarise</div>
                    <div class="card">📄 CV Builder</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
                <button class="send-text" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const mainUi = document.getElementById('main-ui');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if(sidebar.classList.contains('active')) loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            data.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item.query;
                list.appendChild(div);
            });
        }

        async function sendMessage() {
            const query = input.value.trim();
            if (!query) return;

            if (mainUi) mainUi.style.display = 'none';

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.innerText = query;
            chatBox.appendChild(uDiv);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const jDiv = document.createElement('div');
            jDiv.className = 'message bot';
            jDiv.innerText = "...";
            chatBox.appendChild(jDiv);

            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            jDiv.innerHTML = marked.parse(data.reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
