<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Access</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #a855f7; text-align: center; box-shadow: 0 0 20px rgba(168,85,247,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #a855f7; color: white; font-weight: bold; cursor: pointer; }
        a { color: #9ca3af; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Access Protocol</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Identify</button>
        </form>
        <p><a href="/register">New User? Register here</a></p>
    </div>
</body>
</html>
