<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Identification</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%);
            --accent-purple: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden;
        }

        .login-card { 
            background: var(--glass-bg); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(168, 85, 247, 0.3); 
            text-align: center; 
            width: 85%;
            max-width: 400px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .mini-orb {
            width: 60px; height: 60px;
            background: radial-gradient(circle, #d8b4fe 0%, #a855f7 50%, #6366f1 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            filter: blur(2px);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        h2 { margin: 0; font-weight: 600; font-size: 24px; letter-spacing: 0.5px; }
        p.subtitle { color: #9ca3af; font-size: 14px; margin: 10px 0 30px; }
        
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            padding-right: 45px; /* space for eye icon */
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.3); 
            color: white; 
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-purple); background: rgba(0, 0, 0, 0.5); }
        
        /* 🔥 EYE ICON STYLING */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--accent-purple);
            font-size: 18px;
            user-select: none;
            z-index: 10;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 14px; 
            border: none; 
            background: #7c3aed; 
            color: white; 
            font-weight: 600; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            margin-top: 10px;
        }

        button:active { transform: scale(0.97); }
        
        .footer-links { margin-top: 25px; font-size: 14px; color: #9ca3af; }
        a { color: #d8b4fe; text-decoration: none; font-weight: 600; }
        
        /* 🔥 FLASH MESSAGE STYLING */
        .flash { 
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444; 
            font-size: 13px; 
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="mini-orb"></div>
        <h2>Identify Yourself</h2>
        <p class="subtitle">Secure Access Protocol</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <input type="password" name="password" id="passInput" placeholder="Passcode" required>
                <span class="toggle-password" onclick="togglePass()">👁️</span>
            </div>
            
            <button type="submit">Verify Identity</button>
        </form>

        <div class="footer-links">
            <a href="#" style="display: block; margin-bottom: 10px; font-size: 12px; opacity: 0.7;">Forgot Passcode?</a>
            New user? <a href="/register">Initialize Identity</a>
        </div>
    </div>

    <script>
        // 🔥 JAVASCRIPT FOR VIEW/HIDE PASSWORD
        function togglePass() {
            const passInput = document.getElementById('passInput');
            const eyeIcon = document.querySelector('.toggle-password');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🙈'; // Hide icon
            } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️'; // Show icon
            }
        }
    </script>
</body>
</html>
