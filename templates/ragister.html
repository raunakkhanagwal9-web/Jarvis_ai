<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top, #2a1b3d 0%, #050505 100%); 
            color: white; 
            font-family: 'SF Pro Display', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .register-card { 
            background: rgba(255,255,255,0.05); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid #a855f7; 
            text-align: center; 
            width: 90%;
            max-width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(168,85,247,0.2); 
        }
        h2 { margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.5); 
            color: white; 
            outline: none;
            font-size: 16px;
        }
        input:focus { border-color: #a855f7; }
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 15px;
            border-radius: 12px; 
            border: none; 
            background: #7c3aed; 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.3s;
        }
        button:active { transform: scale(0.98); }
        .links { margin-top: 20px; font-size: 13px; color: #9ca3af; }
        a { color: #d8b4fe; text-decoration: none; font-weight: bold; }
        .flash-msg { color: #ff4d4d; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>New Protocol</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Create Identity</button>
        </form>
        <div class="links">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
